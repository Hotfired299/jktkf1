<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <!-- 确保在手机端完美适配屏幕宽度，不允许用户手动缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pakej Kejutan</title>
    <style>
        /* 移除浏览器默认的间距，确保框架填满整个手机屏幕 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* 背景设为黑色，防止白屏闪烁 */
        }
        
        /* 撑满全屏的内嵌框架样式 */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- 将 src 属性里的链接替换为您实际存放红包活动或跳转的真实网址 -->
    <iframe src="https://你的真实活动网址.com/malay-version" title="Pakej Hadiah"></iframe>

</body>
</html>
