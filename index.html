<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pakej Hadiah Kejutan</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #1a0000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        /* 移动端主体容器 - 精确呈现第一张图 */
        .container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            position: relative;
            background: url('https://static.gwvkyk.com/media/28256c9e275a624a6dc76.png') no-repeat center center;
            background-size: cover;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* 特效：动态金币雨背景画布 */
        #coinCanvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        /* 核心点击区：精准覆盖图1中心金币位置 */
        .clickable-gold-container {
            position: absolute;
            top: 585px; 
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 90px;
            z-index: 10;
        }

        .clickable-gold {
            width: 100%;
            height: 100%;
            cursor: pointer;
            border-radius: 50%;
            position: relative;
            animation: pulseEffect 1.4s infinite ease-in-out;
        }

        /* 金币四周的金色双重光圈雷达扩散特效 */
        .clickable-gold::before, .clickable-gold::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            background: rgba(255, 215, 0, 0.4);
            z-index: -1;
            animation: rippleEffect 2s infinite linear;
        }
        .clickable-gold::after {
            animation-delay: 1s;
        }

        @keyframes pulseEffect {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); box-shadow: 0 0 25px rgba(255, 215, 0, 0.8); }
            100% { transform: scale(1); }
        }

        @keyframes rippleEffect {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        /* 点击瞬间炸开的金色碎屑粒子 */
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #fff, #ffd700);
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            box-shadow: 0 0 10px #ffd700;
        }
    </style>
</head>
<body>

    <!-- 预留音频组件：点击金币时激活 -->
    <audio id="bgMusic" loop preload="auto">
        <source src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" type="audio/ogg">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
    </audio>

    <!-- 网页主体 -->
    <div class="container">
        <!-- 背景金币雨 -->
        <canvas id="coinCanvas"></canvas>
        
        <!-- 核心交互区 -->
        <div class="clickable-gold-container">
            <div class="clickable-gold" id="angpaoBtn"></div>
        </div>
    </div>

    <script>
        const angpaoBtn = document.getElementById('angpaoBtn');
        const bgMusic = document.getElementById('bgMusic');
        const canvas = document.getElementById('coinCanvas');
        const ctx = canvas.getContext('2d');

        let animationFrameId;
        const coins = [];
        const coinTypes = ['🪙', '🧧', '✨'];

        // 初始化画布大小
        function initCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        // 金币飘落逻辑
        class CoinItem {
            constructor() { this.reset(); this.y = Math.random() * canvas.height; }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -20;
                this.size = Math.random() * 14 + 12;
                this.speedY = Math.random() * 2 + 1.5;
                this.speedX = Math.random() * 1 - 0.5;
                this.type = coinTypes[Math.floor(Math.random() * coinTypes.length)];
                this.angle = Math.random() * 360;
                this.spinSpeed = Math.random() * 2 - 1;
            }
            update() { this.y += this.speedY; this.x += this.speedX; this.angle += this.spinSpeed; if (this.y > canvas.height) this.reset(); }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle * Math.PI / 180);
                ctx.font = `${this.size}px serif`; ctx.fillText(this.type, -this.size/2, this.size/2); ctx.restore();
            }
        }
        
        for(let i=0; i<40; i++) coins.push(new CoinItem());
        
        function drawScreenLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            coins.forEach(coin => { coin.update(); coin.draw(); });
            animationFrameId = requestAnimationFrame(drawScreenLoop);
        }
        drawScreenLoop();

        // 点击爆炸粒子效果
        function createExplosion(clickX, clickY) {
            for (let i = 0; i < 24; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                document.body.appendChild(p);
                const angle = Math.random() * Math.PI * 2, speed = Math.random() * 4 + 3;
                let posX = clickX, posY = clickY, opacity = 1;
                p.style.left = posX + 'px'; p.style.top = posY + 'px';
                const pAnim = setInterval(() => {
                    posX += Math.cos(angle) * speed; posY += Math.sin(angle) * speed + 0.5; opacity -= 0.04;
                    p.style.left = posX + 'px'; p.style.top = posY + 'px'; p.style.opacity = opacity;
                    if (opacity <= 0) { clearInterval(pAnim); p.remove(); }
                }, 16);
            }
        }

        // 监听金币点击：触发特效、播放音乐并直接跳转网页
        angpaoBtn.addEventListener('click', (e) => {
            const rect = angpaoBtn.getBoundingClientRect();
            const clickX = rect.left + rect.width / 2;
            const clickY = rect.top + rect.height / 2;
            
            // 1. 播放点击碎屑爆炸特效
            createExplosion(clickX, clickY);
            
            // 2. 播放声音
            bgMusic.play().catch(err => console.log("Audio play blocked: ", err));

            // 3. 延时 250 毫秒（给爆炸特效一点展示时间），随后直接跳去目标网页
            setTimeout(() => {
                window.location.href = "https://ritz99.net/RFR99F1";
            }, 250);
        });
    </script>
</body>
</html>
