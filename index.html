<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pakej Hadiah Kejutan</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #1a0000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        /* 移动端主体容器 */
        .container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            position: relative;
            background: url('https://static.gwvkyk.com/media/28256c9e275a624a6dc76.png') no-repeat center center;
            background-size: cover;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* 特效：动态金币雨背景画布 */
        #coinCanvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        /* 第一页中心金币雷达光圈 */
        .clickable-gold-container {
            position: absolute;
            top: 585px; 
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 90px;
            z-index: 10;
        }

        .clickable-gold {
            width: 100%;
            height: 100%;
            cursor: pointer;
            border-radius: 50%;
            position: relative;
            animation: pulseEffect 1.4s infinite ease-in-out;
        }

        .clickable-gold::before, .clickable-gold::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            background: rgba(255, 215, 0, 0.4);
            z-index: -1;
            animation: rippleEffect 2s infinite linear;
        }
        .clickable-gold::after {
            animation-delay: 1s;
        }

        @keyframes pulseEffect {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); box-shadow: 0 0 25px rgba(255, 215, 0, 0.8); }
            100% { transform: scale(1); }
        }

        @keyframes rippleEffect {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        /* 点击爆炸粒子 */
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #fff, #ffd700);
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            box-shadow: 0 0 10px #ffd700;
        }

        /* 弹窗遮罩层 */
        .popup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        /* 第二页中奖彩带Canvas画布 */
        #confettiCanvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1005;
        }

        /* 第二页弹窗入场与滤镜特效 */
        .popup-content {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            position: relative;
            background: url('https://static.gwvkyk.com/media/cbc445ae275a60b8c00e7.png') no-repeat center center;
            background-size: cover;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15) forwards;
            box-shadow: 0 0 50px rgba(255, 51, 51, 0.3);
        }

        @keyframes popIn {
            0% { transform: scale(0.85); opacity: 0; filter: brightness(1.8); }
            100% { transform: scale(1); opacity: 1; filter: brightness(1); }
        }

        /* 动态日期容器 */
        .dynamic-date-box {
            position: absolute;
            top: 778px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #ffe6e6;
            font-size: 0.9rem;
            font-weight: bold;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.9), 0 0 5px rgba(255,0,0,0.5);
            z-index: 15;
            letter-spacing: 0.5px;
        }

        /* 第二页透明按钮点击热区 + 新增金色呼吸闪烁诱导特效 */
        .transparent-btn {
            position: absolute;
            bottom: 115px;
            left: 50%;
            transform: translateX(-50%);
            width: 65%;
            height: 55px;
            background: rgba(255, 215, 0, 0.05);
            border: none;
            cursor: pointer;
            z-index: 1020;
            border-radius: 30px;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0);
            animation: btnGlow 1.2s infinite ease-in-out;
        }

        @keyframes btnGlow {
            0% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.1); background: rgba(255, 215, 0, 0.02); }
            50% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.6); background: rgba(255, 215, 0, 0.15); }
            100% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.1); background: rgba(255, 215, 0, 0.02); }
        }
    </style>
</head>
<body>

    <!-- 预留音频组件：这里使用的是一段欢快的经典新年/财神中奖纯音乐（可替换src链接） -->
    <audio id="bgMusic" loop preload="auto">
        <source src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" type="audio/ogg">
        <!-- 备用音频库源，确保各手机端能顺利播放喜庆音乐 -->
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
    </audio>

    <!-- 首页 container -->
    <div class="container">
        <canvas id="coinCanvas"></canvas>
        <div class="clickable-gold-container">
            <div class="clickable-gold" id="angpaoBtn"></div>
        </div>
    </div>

    <!-- 弹窗遮罩层 -->
    <div class="popup-overlay" id="popupOverlay">
        <div class="popup-content">
            <!-- 第二页专属特效画布：喷洒礼花彩带 -->
            <canvas id="confettiCanvas"></canvas>

            <!-- 动态截止日期 -->
            <div class="dynamic-date-box" id="expiryText">
                *Tuntutan ganjaran tamat pada...
            </div>
            
            <!-- 透明按钮跳转热区 -->
            <button class="transparent-btn" onclick="claimPrize()"></button>
        </div>
    </div>

    <script>
        const angpaoBtn = document.getElementById('angpaoBtn');
        const popupOverlay = document.getElementById('popupOverlay');
        const expiryText = document.getElementById('expiryText');
        const bgMusic = document.getElementById('bgMusic');
        
        // 第一页画布逻辑
        const canvas = document.getElementById('coinCanvas');
        const ctx = canvas.getContext('2d');
        // 第二页画布逻辑
        const confettiCanvas = document.getElementById('confettiCanvas');
        const cCtx = confettiCanvas.getContext('2d');

        let animationFrameId;
        let confettiFrameId;
        const coins = [];
        const confettis = [];
        const coinTypes = ['🪙', '🧧', '✨'];
        const confettiColors = ['#ffd700', '#ff3333', '#ff66b2', '#33ccff', '#ffff33', '#ffffff'];

        function initCanvases() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', initCanvases);
        initCanvases();

        // --- 第一页金币飘落类 ---
        class CoinItem {
            constructor() { this.reset(); this.y = Math.random() * canvas.height; }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -20;
                this.size = Math.random() * 14 + 12;
                this.speedY = Math.random() * 2 + 1.5;
                this.speedX = Math.random() * 1 - 0.5;
                this.type = coinTypes[Math.floor(Math.random() * coinTypes.length)];
                this.angle = Math.random() * 360;
                this.spinSpeed = Math.random() * 2 - 1;
            }
            update() { this.y += this.speedY; this.x += this.speedX; this.angle += this.spinSpeed; if (this.y > canvas.height) this.reset(); }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle * Math.PI / 180);
                ctx.font = `${this.size}px serif`; ctx.fillText(this.type, -this.size/2, this.size/2); ctx.restore();
            }
        }
        for(let i=0; i<40; i++) coins.push(new CoinItem());
        function drawScreenLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            coins.forEach(coin => { coin.update(); coin.draw(); });
            animationFrameId = requestAnimationFrame(drawScreenLoop);
        }
        drawScreenLoop();

        // --- 第二页彩带粒子类 ---
        class ConfettiItem {
            constructor() {
                this.x = confettiCanvas.width / 2 + (Math.random() * 60 - 30);
                this.y = confettiCanvas.height + 20;
                this.size = Math.random() * 6 + 6;
                // 向上喷射的角度和初速度
                this.speedY = -(Math.random() * 8 + 10);
                this.speedX = Math.random() * 8 - 4;
                this.gravity = 0.25;
                this.color = confettiColors[Math.floor(Math.random() * confettiColors.length)];
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 4 - 2;
                this.opacity = 1;
            }
            update() {
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.rotation += this.rotationSpeed;
                if(this.speedY > 0) this.opacity -= 0.01;
            }
            draw() {
                cCtx.save();
                cCtx.translate(this.x, this.y);
                cCtx.rotate(this.rotation * Math.PI / 180);
                cCtx.globalAlpha = this.opacity;
                cCtx.fillStyle = this.color;
                cCtx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                cCtx.restore();
            }
        }

        function drawConfettiLoop() {
            cCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            // 持续补充新抛出的彩带
            if(confettis.length < 100) {
                for(let i=0; i<3; i++) confettis.push(new ConfettiItem());
            }
            for(let i = confettis.length - 1; i >= 0; i--) {
                confettis[i].update();
                confettis[i].draw();
                if(confettis[i].opacity <= 0 || confettis[i].y > confettiCanvas.height) {
                    confettis.splice(i, 1);
                }
            }
            confettiFrameId = requestAnimationFrame(drawConfettiLoop);
        }

        // --- 点击爆炸粒子 ---
        function createExplosion(clickX, clickY) {
            for (let i = 0; i < 24; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                document.body.appendChild(p);
                const angle = Math.random() * Math.PI * 2, speed = Math.random() * 4 + 3;
                let posX = clickX, posY = clickY, opacity = 1;
                p.style.left = posX + 'px'; p.style.top = posY + 'px';
                const pAnim = setInterval(() => {
                    posX += Math.cos(angle) * speed; posY += Math.sin(angle) * speed + 0.5; opacity -= 0.04;
                    p.style.left = posX + 'px'; p.style.top = posY + 'px'; p.style.opacity = opacity;
                    if (opacity <= 0) { clearInterval(pAnim); p.remove(); }
                }, 16);
            }
        }

        // --- 日期逻辑 ---
        function setExpiryDate() {
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(today.getDate() + 1);
            const malayMonths = ["Januari", "Februari", "Mac", "April", "Mei", "Jun", "Julai", "Ogos", "September", "Oktober", "November", "Disember"];
            expiryText.innerText = `*Tuntutan ganjaran tamat pada ${tomorrow.getDate()} ${malayMonths[tomorrow.getMonth()]} ${tomorrow.getFullYear()}`;
        }
        setExpiryDate();

        // 点击金币事件
        angpaoBtn.addEventListener('click', (e) => {
            const rect = angpaoBtn.getBoundingClientRect();
            createExplosion(rect.left + rect.width / 2, rect.top + rect.height / 2);
            
            // 💡 核心：用户点击的瞬间激活并播放音乐
            bgMusic.play().catch(err => console.log("音乐播放受限: ", err));

            setTimeout(() => {
                cancelAnimationFrame(animationFrameId); // 关掉第一页特效
                popupOverlay.style.display = 'flex';
                confettiCanvas.width = window.innerWidth;
                confettiCanvas.height = window.innerHeight;
                drawConfettiLoop(); // 开启第二页彩带狂欢特效
            }, 300);
        });

        function claimPrize() {
            window.location.href = "https://ritz99.net/RFR99F";
        }
    </script>
</body>
</html>
