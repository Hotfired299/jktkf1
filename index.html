<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pakej Hadiah Kejutan</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #3a0000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        /* 移动端主体容器 - 完美适配第一张图 */
        .container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            position: relative;
            background: url('https://static.gwvkyk.com/media/28256c9e275a624a6dc76.png') no-repeat center center;
            background-size: cover;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* 核心交互区：定位在第一张图红包的中心金币位置 */
        .clickable-gold {
            position: absolute;
            top: 585px; /* 根据图1金币位置精准定位 */
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 90px;
            cursor: pointer;
            z-index: 10;
            border-radius: 50%;
            /* 呼吸放大缩小特效，吸引用户点击 */
            animation: pulseEffect 1.6s infinite ease-in-out;
        }

        @keyframes pulseEffect {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); box-shadow: 0 0 20px rgba(255, 215, 0, 0.6); }
            100% { transform: translateX(-50%) scale(1); }
        }

        /* 弹窗遮罩层 */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        /* 弹窗内容容器 - 完美适配第二张图 */
        .popup-content {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            position: relative;
            background: url('https://static.gwvkyk.com/media/cbc445ae275a60b8c00e7.png') no-repeat center center;
            background-size: cover;
            animation: popIn 0.3s ease-out forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 动态日期容器：定位在图2中原日期文本的上方 */
        .dynamic-date-box {
            position: absolute;
            top: 778px; /* 根据图2原本日期位置覆盖 */
            left: 0;
            width: 100%;
            text-align: center;
            color: #ffcccc;
            font-size: 0.9rem;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
            z-index: 15;
            letter-spacing: 0.5px;
        }

        /* 按钮点击热区：覆盖在图2“Tuntut Sekarang”红色按钮上方 */
        .transparent-btn {
            position: absolute;
            bottom: 115px; /* 精准对齐图2按钮位置 */
            left: 50%;
            transform: translateX(-50%);
            width: 65%;
            height: 55px;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 20;
            border-radius: 30px;
        }
    </style>
</head>
<body>

    <!-- 首页容器（第一张图） -->
    <div class="container">
        <!-- 覆盖在金币上方的透明动态点击区域 -->
        <div class="clickable-gold" id="angpaoBtn"></div>
    </div>

    <!-- 弹窗遮罩层与第二张图 -->
    <div class="popup-overlay" id="popupOverlay">
        <div class="popup-content">
            
            <!-- 动态日期：自动计算并完美覆盖原图上的静态日期 -->
            <div class="dynamic-date-box" id="expiryText">
                *Tuntutan ganjaran tamat pada...
            </div>
            
            <!-- 覆盖在“Tuntut Sekarang”字样上面的透明跳转按钮 -->
            <button class="transparent-btn" onclick="claimPrize()"></button>
        </div>
    </div>

    <script>
        const angpaoBtn = document.getElementById('angpaoBtn');
        const popupOverlay = document.getElementById('popupOverlay');
        const expiryText = document.getElementById('expiryText');

        // 智能动态日期计算：获取用户打开网页的明天日期
        function setExpiryDate() {
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(today.getDate() + 1); // 自动进 1 天

            const day = tomorrow.getDate();
            const year = tomorrow.getFullYear();
            
            // 马来语标准月份
            const malayMonths = [
                "Januari", "Februari", "Mac", "April", "Mei", "Jun", 
                "Julai", "Ogos", "September", "Oktober", "November", "Disember"
            ];
            const month = malayMonths[tomorrow.getMonth()];

            // 格式化输出为最终与原图风格一致的文案
            const formattedDate = `${day} ${month} ${year}`;
            expiryText.innerText = `*Tuntutan ganjaran tamat pada ${formattedDate}`;
        }

        // 初始化日期填充
        setExpiryDate();

        // 点击第一页金币打开第二页弹窗
        angpaoBtn.addEventListener('click', () => {
            popupOverlay.style.display = 'flex';
        });

        // 点击第二页按钮跳转至你的目标客服系统
        function claimPrize() {
            window.location.href = "https://ritz99.net/RFR99F";
        }
    </script>
</body>
</html>
