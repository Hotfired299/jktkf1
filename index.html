<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Platform Access</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0d0600;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        /* 移动端主体容器 - 使用你上传的全新精美荷官图 */
        .container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            position: relative;
            background: url('https://static.gwvkyk.com/media/28256c9e275a624a6dc76.png') no-repeat center center; /* 注意：请在此处替换为你上传的这幅图的有效线上链接 */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="450" height="800" viewBox="0 0 450 800"><rect width="450" height="800" fill="%231a0d00"/></svg>'); /* 兜底背景 */
            background-size: cover;
            box-shadow: 0 0 35px rgba(0,0,0,0.9);
            overflow: hidden;
            cursor: pointer;
        }

        /* 实际开发中，请将上面的 background-image 替换为你最新的图片链接。为了确保 100% 覆盖修改，我们用代码在上方生成修改层： */
        
        /* 1. 顶部黑金卷轴部分的 Logo 覆盖修改 */
        .logo-patch-top {
            position: absolute;
            top: 75px;
            left: 62px;
            width: 120px;
            height: 25px;
            background: #000000; /* 遮盖原GOAT77 */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-text {
            color: #ffd700;
            font-size: 1.1rem;
            font-weight: 900;
            font-style: italic;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(255,215,0,0.6);
        }
        .logo-subtext {
            font-size: 0.35rem;
            color: #ccc;
            position: absolute;
            bottom: -2px;
            letter-spacing: 0.5px;
        }

        /* 2. 文本修改：将 POWER UP BONUS 变去 POWER UP BONUS 50% */
        .bonus-patch {
            position: absolute;
            top: 108px;
            left: 50px;
            width: 200px;
            height: 30px;
            background: #000000; /* 遮盖原文字区域 */
            display: flex;
            align-items: center;
        }
        .bonus-text-new {
            color: #ffffff;
            font-size: 1.15rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff 30%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.8));
        }

        /* 3. 底部页脚的 Logo 覆盖修改 */
        .logo-patch-bottom {
            position: absolute;
            bottom: 20px;
            left: 28px;
            width: 100px;
            height: 35px;
            background: #111111;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- 特效部分 --- */
        /* 特效1：动态金币雨背景画布 */
        #coinCanvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        /* 特效2：给美丽的红衣女手里的扑克牌加一个闪烁的高光特效，更显神圣好运 */
        .card-glow {
            position: absolute;
            top: 485px;
            left: 335px;
            width: 45px;
            height: 65px;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0);
            pointer-events: none;
            z-index: 5;
            animation: cardFlash 2s infinite ease-in-out;
        }

        @keyframes cardFlash {
            0% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.1); }
            50% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.8); }
            100% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.1); }
        }

        /* 点击瞬间炸开的金色碎屑粒子 */
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #fff, #ffd700);
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            box-shadow: 0 0 10px #ffd700;
        }
    </style>
</head>
<body>

    <!-- 赌场风格背景音乐 -->
    <audio id="bgMusic" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" type="audio/mp3">
    </audio>

    <!-- 网页主体容器（整页可点，直接跳转） -->
    <div class="container" id="mainLandingPage">
        <!-- 金币雨特效 -->
        <canvas id="coinCanvas"></canvas>

        <!-- 扑克牌好运金光特效 -->
        <div class="card-glow"></div>

        <!-- 完美的动态修改层：动态用代码把网页上的Logo换成你的 RITZ99 -->
        <div class="logo-patch-top">
            <div class="logo-text">RITZ99</div>
            <div class="logo-subtext">GREATEST OF ALL TIME</div>
        </div>

        <!-- 完美的动态修改层：将文案修改为 POWER UP BONUS 50% -->
        <div class="bonus-patch">
            <div class="bonus-text-new">POWER UP BONUS 50%</div>
        </div>

        <!-- 完美的动态修改层：底部Logo同样换成 RITZ99 -->
        <div class="logo-patch-bottom">
            <div class="logo-text" style="font-size: 0.95rem;">RITZ99</div>
            <div class="logo-subtext" style="font-size: 0.3rem; bottom: 2px;">GREATEST OF ALL TIME</div>
        </div>
    </div>

    <script>
        const mainLandingPage = document.getElementById('mainLandingPage');
        const bgMusic = document.getElementById('bgMusic');
        const canvas = document.getElementById('coinCanvas');
        const ctx = canvas.getContext('2d');

        let animationFrameId;
        const coins = [];
        const coinTypes = ['🪙', '✨'];

        // 初始化画布
        function initCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        // 金币飘落逻辑
        class CoinItem {
            constructor() { this.reset(); this.y = Math.random() * canvas.height; }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -20;
                this.size = Math.random() * 12 + 10;
                this.speedY = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.8 - 0.4;
                this.type = coinTypes[Math.floor(Math.random() * coinTypes.length)];
                this.angle = Math.random() * 360;
                this.spinSpeed = Math.random() * 2 - 1;
            }
            update() { this.y += this.speedY; this.x += this.speedX; this.angle += this.spinSpeed; if (this.y > canvas.height) this.reset(); }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle * Math.PI / 180);
                ctx.font = `${this.size}px serif`; ctx.fillText(this.type, -this.size/2, this.size/2); ctx.restore();
            }
        }
        
        for(let i=0; i<30; i++) coins.push(new CoinItem());
        
        function drawScreenLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            coins.forEach(coin => { coin.update(); coin.draw(); });
            animationFrameId = requestAnimationFrame(drawScreenLoop);
        }
        drawScreenLoop();

        // 点击爆炸特效
        function createExplosion(clickX, clickY) {
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                document.body.appendChild(p);
                const angle = Math.random() * Math.PI * 2, speed = Math.random() * 4 + 2;
                let posX = clickX, posY = clickY, opacity = 1;
                p.style.left = posX + 'px'; p.style.top = posY + 'px';
                const pAnim = setInterval(() => {
                    posX += Math.cos(angle) * speed; posY += Math.sin(angle) * speed + 0.4; opacity -= 0.05;
                    p.style.left = posX + 'px'; p.style.top = posY + 'px'; p.style.opacity = opacity;
                    if (opacity <= 0) { clearInterval(pAnim); p.remove(); }
                }, 16);
            }
        }

        // 全屏任意位置点击：播放爆炸特效、触发赌场音乐、直接重定向跳转
        mainLandingPage.addEventListener('click', (e) => {
            const clickX = e.clientX;
            const clickY = e.clientY;
            
            // 1. 触发点击特效
            createExplosion(clickX, clickY);
            
            // 2. 播放赌场音乐
            bgMusic.play().catch(err => console.log("Audio play blocked"));

            // 3. 完美切入跳转链接
            setTimeout(() => {
                window.location.href = "https://ritz99.net/RFR99F1";
            }, 260);
        });
    </script>
</body>
</html>
