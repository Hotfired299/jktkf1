<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>RITZ99</title>

  <style>
    /* =================================================
       1. 基础页面设置
       ================================================= */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
    }

    .stage {
      width: 100%;
      height: 100vh;
      height: 100svh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000000;
      position: relative;
    }

    /* =================================================
       2. 主容器（严格 9:16 手机完美比例）
       ================================================= */
    .container {
      position: relative;
      width: 100%;
      height: 100vh;      
      height: 100svh;     
      height: 100dvh;     
      aspect-ratio: 9 / 16;
      max-width: 576px; /* 限制 PC 端最大宽度 */

      /* 自动加载你给的最新的合成背景图 */
      background-image: url('https://static.gwvkyk.com/media/f52710cb375a6d83004aa.png');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center center;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      overflow: hidden;
    }

    /* =================================================
       3. 独家动态金币掉落效果
       ================================================= */
    .coin-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; /* 让金币不影响按钮点击 */
      z-index: 5;
    }

    .coin {
      position: absolute;
      background: radial-gradient(circle at 30% 30%, #ffe875 0%, #f7b113 70%, #b87b00 100%);
      border-radius: 50%;
      box-shadow: inset -2px -2px 4px rgba(0,0,0,0.4), 0 4px 8px rgba(0,0,0,0.3);
      border: 1px solid #ffd859;
    }
    /* 金币内部的浮雕钱币圈 */
    .coin::after {
      content: '';
      position: absolute;
      top: 15%; left: 15%; right: 15%; bottom: 15%;
      border: 1px dashed rgba(255,255,255,0.6);
      border-radius: 50%;
    }

    @keyframes fall {
      0% {
        top: -50px;
        transform: translateX(0) rotateY(0deg) rotateX(0deg);
        opacity: 1;
      }
      100% {
        top: 105%;
        transform: translateX(50px) rotateY(720deg) rotateX(360deg);
        opacity: 0.3;
      }
    }

    /* =================================================
       4. 浮动按钮区域与炫酷纯 CSS 按钮设计
       ================================================= */
    .buttons {
      position: absolute;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 55%; /* 控制按钮整体占屏幕宽度的比例 */
    }

    /* 按钮基础样式 */
    .custom-btn {
      width: 100%;
      padding: 12px 10px;
      font-size: 16px;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #ffffff;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.5), inset 0 2px 4px rgba(255,255,255,0.4);
      animation: pulse 1.5s ease-in-out infinite;
      -webkit-tap-highlight-color: transparent;
    }

    /* 按钮 1：WEBSITE 豪华绿金渐变 */
    .btn-website {
      background: linear-gradient(135deg, #00A859 0%, #00703C 50%, #004724 100%);
      border: 2px solid #00FF80;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }

    /* 按钮 2：TELEGRAM 官方炫酷蓝 */
    .btn-telegram {
      background: linear-gradient(135deg, #2AABEE 0%, #229ED9 50%, #177EAB 100%);
      border: 2px solid #64D2FF;
      text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    }

    /* 闪光特效 (Shine) */
    .custom-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -150%;
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.7) 50%, rgba(255,255,255,0) 100%);
      transform: skewX(-25deg);
      animation: shine 3s infinite ease-in-out;
    }

    /* 按钮小图标 */
    .btn-icon {
      margin-right: 8px;
      font-size: 18px;
    }

    /* 呼吸动画 */
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 6px 15px rgba(0,0,0,0.5); }
      50% { transform: scale(1.05); box-shadow: 0 10px 22px rgba(0, 255, 128, 0.2); }
    }

    /* 扫光动画 */
    @keyframes shine {
      0% { left: -150%; }
      30% { left: 150%; }
      100% { left: 150%; }
    }

    /* =================================================
       5. 移动端与不同系统的自适应精确定位
       ================================================= */
    /* iOS 苹果系列手机定位 */
    .ios .buttons {
      bottom: calc(14% + env(safe-area-inset-bottom));
      right: 5%;
    }

    /* Android 安卓系列手机定位 */
    .android .buttons {
      bottom: 14%;
      right: 5%;
    }

    /* PC端测试预览自适应 */
    @media (min-width: 768px) {
      .buttons {
        bottom: 14%;
        right: 6%;
      }
    }
  </style>
</head>

<body>
  <div class="stage">
    <div class="container">
      
      <div class="coin-container" id="coin-layer"></div>

      <div class="buttons">
        <a id="website-btn" href="https://ritz99.net/RFR99F1" class="custom-btn btn-website">
          <span class="btn-icon">🌐</span> WEBSITE
        </a>

        <a href="https://t.me/Ritz99my_Bot?start=adlinkFBB1" target="_blank" rel="noopener" class="custom-btn btn-telegram">
          <span class="btn-icon">✈</span> TELEGRAM BOT
        </a>
      </div>

    </div>
  </div>

  <script>
    /* =================================================
       1. 智能设备环境辨别
       ================================================= */
    (function () {
      const ua = navigator.userAgent || navigator.vendor || window.opera;
      const isAndroid = /Android/i.test(ua);
      const isIOS =
        /iPhone|iPad|iPod/i.test(ua) ||
        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

      document.body.classList.toggle('android', isAndroid);
      document.body.classList.toggle('ios', isIOS);
    })();

    /* =================================================
       2. 动态传递代理参数 (aff)
       ================================================= */
    const urlParams = new URLSearchParams(window.location.search);
    const aff = urlParams.get('aff');
    const websiteBtn = document.getElementById("website-btn");
    const baseURL = "https://ritz99.net/RFR99F1"; 

    if (aff) {
      websiteBtn.href = `${baseURL}${baseURL.includes('?') ? '&' : '?'}aff=${aff}`;
    }

    /* =================================================
       3. 金币随机掉落逻辑代码
       ================================================= */
    const coinLayer = document.getElementById('coin-layer');
    function createCoin() {
      const coin = document.createElement('div');
      coin.classList.add('coin');
      
      // 随机金币大小（15px 到 28px 之间）
      const size = Math.random() * 13 + 15;
      coin.style.width = `${size}px`;
      coin.style.height = `${size}px`;
      
      // 随机横向初始位置
      coin.style.left = `${Math.random() * 100}%`;
      
      // 随机下落时间与延迟时间，让掉落更自然有错落感
      const duration = Math.random() * 2 + 2.5; // 2.5s - 4.5s
      const delay = Math.random() * 2;
      coin.style.animation = `fall ${duration}s linear ${delay}s infinite`;
      
      coinLayer.appendChild(coin);
      
      // 定时清理隐形金币，释放手机内存
      setTimeout(() => {
        coin.remove();
      }, (duration + delay) * 1000);
    }

    // 初始化生成 15 个随机掉落金币
    for (let i = 0; i < 15; i++) {
      createCoin();
    }
    // 每隔 400 毫秒自动持续补充新金币
    setInterval(createCoin, 400);
  </script>
</body>
</html>
